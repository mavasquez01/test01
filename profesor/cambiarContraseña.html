<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="../css/bootstrap.min.css" rel="stylesheet" type="text/css">
        <link href="../css/temaValk.css" rel="stylesheet" type="text/css">
        <link href="../css/bootstrap-icons.css" rel="stylesheet" type="text/css">
        <title>Cambiar Contraseña</title>
    </head>

    <body>
        <nav class="navbar navbar-expand-lg bg-dark bg-body-tertiary" data-bs-theme="dark">

            <div class="container-fluid">

                <a class="navbar-brand ms-2" href="panelProfesor_integrado.html">

                    <img src="../static/arrow_back_ios_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent">

                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="panelProfesor.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="panelProfesor_integrado.html">Clases</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="panelProfesor_integrado.html">Rutinas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="panelProfesor_integrado.html">Perfil</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../autenticacion/iniciarSesion.html">Cerrar Sesión</a>
                        </li>
                    </ul>
                </div>

            </div>

        </nav>
        <main class="mobile-wrapper">
            <div class="d-flex justify-content-center mb-4">

                <h5 class="text-white mb-0 text-center">
                    Cambiar Contraseña
                </h5>
            </div>


            <div class="plan-card">

                <form>

                    <div class="mb-3">

                        <label class="form-label text-white">
                            Contraseña actual
                        </label>

                        <input
                            type="password"
                            class="form-control custom-input"
                            placeholder="Ingresa tu contraseña actual">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-white">
                            Nueva contraseña
                        </label>

                        <input
                            type="password"
                            class="form-control custom-input"
                            placeholder="Mínimo 6 caracteres">

                    </div>

                    <div class="mb-4">

                        <label class="form-label text-white">
                            Confirmar nueva contraseña
                        </label>

                        <input
                            type="password"
                            class="form-control custom-input"
                            placeholder="Repite tu nueva contraseña">

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100 mb-3">

                        Actualizar contraseña

                    </button>

                    <a
                        href="perfil.html"
                        class="btn btn-outline-primary w-100">

                        Cancelar

                    </a>

                </form>

            </div>

            <div class="schedule-card mt-4">

                <div class="d-flex align-items-center">

                    <i class="bi bi-info-circle text-pink me-3"></i>

                    <small class="text-secondary">
                        Se recomienda utilizar una contraseña de al menos 8 caracteres,
                        incluyendo letras y números.
                    </small>

                </div>

            </div>

        </main>

        <script src="../js/bootstrap.bundle.min.js"></script>

    </body>

</html>
