<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="../css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../css/temaValk.css" rel="stylesheet" type="text/css"/>
        <title>Recuperar contraseña</title>
    </head>
    <body>
        <section class="vh-100 gradient-custom">
            <div class="container py-5 h-100">
                <div class="row d-flex justify-content-center align-items-center h-100">
                    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                        <div class="card bg-dark text-white" style="border-radius: 1rem;">
                            <div class="card-body p-5 text-center">

                                <div class="mb-md-5 mt-md-4 pb-5">

                                    <div>
                                        <img src="../static/logoval.png" width="150" alt="alt"/>
                                        <h3 class="fw-bold mb-2 text-uppercase">Recupera tu contraseña</h3>
                                        <p class="text-white-50 mb-5">Ingresa tu correo y te enviaremos instrucciones para restablecerla</p>
                                    </div>

                                    <form id="formularioRecuperarContrasenia">


                                        <div data-mdb-input-init class="form-outline form-white mb-4">
                                            <label class="form-label text-start d-block" for="correo">Correo electronico</label>
                                            <input type="email" id="correo"
                                                   class="form-control form-control-lg"
                                                   data-bs-theme="dark"
                                                   placeholder="Ej: maria@gmail.com">
                                        </div>


                                        <button class="btn btn-primary btn-lg px-5" type="submit">ENVIAR CORREO</button>

                                    </form>
                                </div>

                                <div>
                                    <a href="../index.html" class="text-white-50 fw-bold">Volver al inicio</a>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script src="../js/bootstrap.bundle.min.js"></script>
    </body>
</html>
