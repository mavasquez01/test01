<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="../css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../css/temaValk.css" rel="stylesheet" type="text/css"/>
        <title>Completar perfil</title>
    </head>
    <body>
        <section class="vh-100 gradient-custom">
            <div class="container py-5 h-100">
                <div class="row d-flex justify-content-center align-items-center h-100">
                    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                        <div class="card bg-dark text-white" style="border-radius: 1rem;">
                            <div class="card-body p-5 text-center">

                                <div class="mb-md-5 mt-md-4 pb-5">

                                    <div>
                                        <img src="../static/logoval.png" width="150" alt="alt"/>
                                        <h3 class="fw-bold mb-2 text-uppercase">Completa tus datos</h3>
                                        <h4 class="fw-bold mb-2 text-uppercase">para continuar</h4>
                                    </div>


                                    <form id="formularioPerfil">

                                        <div data-mdb-input-init class="form-outline form-white mb-4">
                                            <label class="form-label text-start d-block" for="nombres">Nombres</label>
                                            <input type="text" id="nombres"
                                                   class="form-control form-control-lg"
                                                   data-bs-theme="dark"
                                                   placeholder="Ej: Maria Gonzalez">
                                        </div>
                                        <div data-mdb-input-init class="form-outline form-white mb-4">
                                            <label class="form-label text-start d-block" for="apellidos">Apellidos</label>
                                            <input type="text" id="apellidos"
                                                   class="form-control form-control-lg"
                                                   data-bs-theme="dark"
                                                   placeholder="Ej: Fuentes Rojas">
                                        </div>
                                        <div data-mdb-input-init class="form-outline form-white mb-4">
                                            <label class="form-label text-start d-block" for="correo">Correo electronico</label>
                                            <input type="email" id="correo"
                                                   class="form-control form-control-lg"
                                                   data-bs-theme="dark"
                                                   placeholder="Ej: maria@gmail.com">
                                        </div>
                                        <div data-mdb-input-init class="form-outline form-white mb-4">
                                            <label class="form-label text-start d-block" for="contraseña">Contraseña</label>
                                            <input type="password" id="contraseña"
                                                   class="form-control form-control-lg"
                                                   data-bs-theme="dark"
                                                   placeholder="Minimo 6 caracteres">
                                        </div>
                                        <div data-mdb-input-init class="form-outline form-white mb-4">
                                            <label class="form-label text-start d-block" for="confirmarContraseña">Confirmar contraseña</label>
                                            <input type="password" id="confirmarContraseña"
                                                   class="form-control form-control-lg"
                                                   data-bs-theme="dark"
                                                   placeholder="Minimo 6 caracteres">
                                        </div>

                                        <button class="btn btn-primary btn-lg px-5" type="submit">GUARDAR Y CONTINUAR</button>

                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script src="../js/bootstrap.bundle.min.js"></script>
    </body>
</html>
